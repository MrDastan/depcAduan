name: Deploy ke depcaduan.delimaholdings.com

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, bcmath, pdo, pdo_mysql, gd, zip, intl, exif
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Deploy ke VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT }}
          script: |
            set -e
            cd /home/admin/web/depcaduan.delimaholdings.com/private/depcaduan

            echo "── Pull kod terbaru ──"
            sudo -u admin git pull origin main

            echo "── Install dependencies ──"
            sudo -u admin composer install --no-dev --optimize-autoloader --no-interaction

            echo "── Jalankan migration ──"
            sudo -u admin php8.3 artisan migrate --force

            echo "── Cache ──"
            sudo -u admin php8.3 artisan config:cache
            sudo -u admin php8.3 artisan route:cache
            sudo -u admin php8.3 artisan view:cache
            sudo -u admin php8.3 artisan event:cache

            echo "── Storage link ──"
            sudo -u admin php8.3 artisan storage:link || true

            echo "── Permission ──"
            chown -R admin:admin storage bootstrap/cache
            chmod -R 775 storage bootstrap/cache

            echo "── Restart queue ──"
            sudo -u admin php8.3 artisan queue:restart || true

            echo "✅ Deploy berjaya — depcaduan.delimaholdings.com"
