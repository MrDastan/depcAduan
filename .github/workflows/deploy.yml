name: Deploy ke depcaduan.delimaholdings.com

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, bcmath, pdo, pdo_mysql, gd, zip, intl, exif
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Deploy ke VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT }}
          script: |
            set -e
            cd /var/www/depcaduan

            echo "── Pull kod terbaru ──"
            git pull origin main

            echo "── Install dependencies ──"
            composer install --no-dev --optimize-autoloader --no-interaction

            echo "── Jalankan migration ──"
            php artisan migrate --force

            echo "── Cache ──"
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache

            echo "── Storage link ──"
            php artisan storage:link || true

            echo "── Permission ──"
            sudo chown -R www-data:www-data storage bootstrap/cache
            sudo chmod -R 775 storage bootstrap/cache

            echo "── Restart queue ──"
            php artisan queue:restart || true

            echo "✅ Deploy berjaya — depcaduan.delimaholdings.com"
